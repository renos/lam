defaults:
  - _self_
  - override hydra/launcher: slurm

# Task + data
task: MolmoBotTracking
# Accepts a single .h5 path OR a directory. Directory mode recursively globs
# **/*.h5 and concats every traj_* group across all files — use it after
# running setup_cluster.sh to pull all houses.
reference_h5: ${hydra:runtime.cwd}/storage/molmobot_data_sample/extracted

# Optional: populate the env's MjModel with objects from a specific recorded
# trajectory's scene_modifications. Single compile, shared across all envs.
# Null = empty base_scene + robot only (fast). Set to an H5 path to load real
# objects. Falls back to empty scene if objaverse assets aren't installed.
scene_from_h5: null
scene_from_h5_traj_key: traj_0
exp_name: v1

# Training scale (single GH200 defaults)
num_envs: 1024
num_timesteps: 500_000_000

# Seed (null = random per run)
seed: null

# Logging
wandb: true
wandb_project: lam-molmobot-tracking
wandb_entity: null
wandb_mode: online   # online | offline | disabled

# PPO hyperparam overrides. null = keep whatever molmobot_tracking_task_config()
# registered. All of these accept CLI overrides for sweeps, e.g.:
#   python train.py --multirun hydra/launcher=slurm entropy_cost=0.01,0.03,0.05
entropy_cost: null
learning_rate: null
num_updates_per_batch: null
num_minibatches: null
batch_size: null
unroll_length: null
discounting: null
clipping_epsilon: null

# Directory layout
training_results_dir: training_results

hydra:
  run:
    dir: .
  sweep:
    dir: .
    subdir: ${hydra.job.num}
  job:
    chdir: false
